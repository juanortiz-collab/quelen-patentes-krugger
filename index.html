<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quelen Patentes Krugger</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      margin-top: 18px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
    }

    .sub {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .tipo-box {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tipo-btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
    }

    .tipo-btn.activo {
      background: #0f172a;
      color: white;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .row-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .acciones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .acciones-4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-buscar {
      background: #2563eb;
      color: white;
    }

    .btn-registrar {
      background: #059669;
      color: white;
    }

    .btn-camara {
      background: #7c3aed;
      color: white;
    }

    .btn-captura {
      background: #ea580c;
      color: white;
    }

    .btn-detener {
      background: #6b7280;
      color: white;
    }

    .btn-ocr {
      background: #0ea5e9;
      color: white;
    }

    .estado {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
    }

    .estado.info {
      display: block;
      background: #dbeafe;
      color: #1e3a8a;
    }

    .estado.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .estado.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .resultado {
      display: none;
      margin-top: 14px;
      padding: 16px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .resultado h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .campo-resultado {
      margin-bottom: 6px;
      font-size: 15px;
    }

    .encontrado {
      border-left: 6px solid #059669;
    }

    .no-encontrado {
      border-left: 6px solid #dc2626;
    }

    .camara-box {
      margin-top: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      background: #fafafa;
    }

    .camara-box h2 {
      margin: 0 0 12px 0;
      font-size: 22px;
    }

    .video-wrap {
      width: 100%;
      background: #0f172a;
      border-radius: 16px;
      overflow: hidden;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
    }

    video {
      width: 100%;
      max-height: 460px;
      display: block;
      background: #0f172a;
    }

    canvas {
      display: none;
    }

    .foto-box {
      margin-top: 16px;
      display: none;
    }

    .foto-box img {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      display: block;
    }

    .foto-label {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .nota {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
    }

    .link-evidencia {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }

    .ocr-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .ocr-box h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .ocr-texto {
      font-family: monospace;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 10px;
      min-height: 70px;
    }

    @media (max-width: 700px) {
      .row, .acciones, .acciones-4 {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Registro de Patentes KRUGGER</h1>
      <div class="sub">Frontend en GitHub Pages + backend en Apps Script + evidencia en Drive + OCR local.</div>

      <div class="tipo-box">
        <button id="btnEntrada" class="tipo-btn activo" onclick="seleccionarTipo('ENTRADA')">ENTRADA</button>
        <button id="btnSalida" class="tipo-btn" onclick="seleccionarTipo('SALIDA')">SALIDA</button>
      </div>

      <div class="row">
        <div>
          <label for="patente">Patente</label>
          <input id="patente" type="text" placeholder="Ejemplo: CRKF23" />
        </div>
        <div>
          <label for="guardia">Guardia</label>
          <input id="guardia" type="text" placeholder="Nombre del guardia" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="acceso">Acceso</label>
          <input id="acceso" type="text" value="Portería 2" />
        </div>
        <div>
          <label for="acompanante">Acompañante</label>
          <input id="acompanante" type="text" placeholder="Opcional" />
        </div>
      </div>

      <div class="row-1">
        <div>
          <label for="observacion">Observación</label>
          <textarea id="observacion" placeholder="Opcional"></textarea>
        </div>
      </div>

      <div class="acciones">
        <button class="btn btn-buscar" onclick="buscarPatente()">Buscar patente</button>
        <button class="btn btn-registrar" onclick="registrarMovimiento()">Registrar movimiento</button>
      </div>

      <div id="estado" class="estado"></div>
      <div id="resultado" class="resultado"></div>

      <div class="camara-box">
        <h2>Cámara</h2>

        <div class="acciones-4">
          <button class="btn btn-camara" onclick="abrirCamara()">Abrir cámara</button>
          <button class="btn btn-captura" onclick="capturarFoto()">Capturar foto</button>
          <button class="btn btn-ocr" onclick="leerPatenteOCR()">Leer patente (OCR)</button>
          <button class="btn btn-detener" onclick="detenerCamara()">Detener cámara</button>
        </div>

        <div class="video-wrap">
          <video id="video" autoplay playsinline muted></video>
        </div>

        <canvas id="canvas"></canvas>
        <iframe id="uploadFrame" name="uploadFrame" style="display:none;"></iframe>

        <div id="fotoBox" class="foto-box">
          <div class="foto-label">Foto capturada</div>
          <img id="fotoPreview" alt="Foto capturada" />
        </div>

        <div class="ocr-box">
          <h3>Resultado OCR</h3>
          <div id="ocrTexto" class="ocr-texto">Aún no se ha ejecutado OCR.</div>
        </div>

        <div class="nota">
          Esta etapa prueba OCR local sobre la foto capturada. La primera lectura puede tardar más que las siguientes.
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVgRg5rpnfXKqHBd_wzbN7F084XeB3-Yrr9ixjuYqUIb6MT8nlu46NqQA8o7EO1XY/exec';

    let tipoMovimiento = 'ENTRADA';
    let currentStream = null;
    let imagenCapturadaBase64 = '';
    let ocrWorker = null;
    let ocrInicializado = false;

    function seleccionarTipo(tipo) {
      tipoMovimiento = tipo;
      document.getElementById('btnEntrada').classList.toggle('activo', tipo === 'ENTRADA');
      document.getElementById('btnSalida').classList.toggle('activo', tipo === 'SALIDA');
    }

    function mostrarEstado(texto, tipo) {
      const box = document.getElementById('estado');
      box.className = 'estado ' + tipo;
      box.textContent = texto;
    }

    function limpiarEstado() {
      const box = document.getElementById('estado');
      box.className = 'estado';
      box.textContent = '';
    }

    function validarBackend() {
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PEGAR_AQUI_URL_EXEC')) {
        throw new Error('Debes pegar tu URL /exec real de Apps Script en APPS_SCRIPT_URL.');
      }
    }

    function setOcrTexto(texto) {
      document.getElementById('ocrTexto').textContent = texto || '';
    }

    function jsonpRequest(action, params = {}) {
      return new Promise((resolve, reject) => {
        try {
          validarBackend();

          const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
          const script = document.createElement('script');
          const url = new URL(APPS_SCRIPT_URL);

          url.searchParams.set('action', action);
          url.searchParams.set('callback', callbackName);

          Object.entries(params).forEach(([key, value]) => {
            url.searchParams.set(key, value == null ? '' : String(value));
          });

          let timeoutId = null;

          function limpiar() {
            if (timeoutId) clearTimeout(timeoutId);
            if (script.parentNode) script.parentNode.removeChild(script);
            try {
              delete window[callbackName];
            } catch (e) {
              window[callbackName] = undefined;
            }
          }

          window[callbackName] = function(response) {
            limpiar();
            resolve(response);
          };

          script.onerror = function() {
            limpiar();
            reject(new Error('No se pudo conectar con el backend.'));
          };

          timeoutId = setTimeout(() => {
            limpiar();
            reject(new Error('La solicitud tardó demasiado.'));
          }, 20000);

          script.src = url.toString();
          document.body.appendChild(script);

        } catch (error) {
          reject(error);
        }
      });
    }

    async function abrirCamara() {
      limpiarEstado();

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          mostrarEstado('Este navegador no soporta acceso a cámara.', 'error');
          return;
        }

        if (currentStream) {
          detenerCamara(false);
        }

        const constraints = {
          audio: false,
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream;

        const video = document.getElementById('video');
        video.srcObject = stream;

        mostrarEstado('Cámara abierta correctamente.', 'ok');
      } catch (error) {
        mostrarEstado('No se pudo abrir la cámara: ' + error.message, 'error');
      }
    }

    function detenerCamara(mostrarMensaje = true) {
      const video = document.getElementById('video');

      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }

      video.srcObject = null;

      if (mostrarMensaje) {
        mostrarEstado('Cámara detenida.', 'info');
      }
    }

    function capturarFoto() {
      limpiarEstado();

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const fotoPreview = document.getElementById('fotoPreview');
      const fotoBox = document.getElementById('fotoBox');

      if (!video.srcObject) {
        mostrarEstado('Primero debes abrir la cámara.', 'error');
        return;
      }

      const width = video.videoWidth;
      const height = video.videoHeight;

      if (!width || !height) {
        mostrarEstado('La cámara aún no está lista. Espera un segundo e inténtalo de nuevo.', 'error');
        return;
      }

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, width, height);

      imagenCapturadaBase64 = canvas.toDataURL('image/jpeg', 0.80);

      fotoPreview.src = imagenCapturadaBase64;
      fotoBox.style.display = 'block';

      setOcrTexto('Foto capturada. Lista para OCR.');
      mostrarEstado('Foto capturada correctamente.', 'ok');
    }

    function dataUrlToBase64(dataUrl) {
      if (!dataUrl || !dataUrl.includes(',')) return '';
      return dataUrl.split(',')[1];
    }

    function limpiarNombreArchivo(texto) {
      return String(texto || 'SINPATENTE')
        .toUpperCase()
        .replace(/[^A-Z0-9_-]/g, '_');
    }

    function normalizarTextoOCR(texto) {
      return String(texto || '')
        .toUpperCase()
        .replace(/[^A-Z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function extraerPatenteProbable(texto) {
      const limpio = normalizarTextoOCR(texto).replace(/\s/g, '');

      const patrones = [
        /[A-Z]{4}[0-9]{2}/g,
        /[A-Z]{2}[A-Z0-9]{2}[0-9]{2}/g,
        /[A-Z]{3}[A-Z0-9][0-9]{2}/g
      ];

      for (const regex of patrones) {
        const match = limpio.match(regex);
        if (match && match.length) {
          return match[0];
        }
      }

      return '';
    }

    async function asegurarWorkerOCR() {
      if (ocrInicializado && ocrWorker) {
        return ocrWorker;
      }

      mostrarEstado('Inicializando OCR por primera vez... puede tardar un poco.', 'info');

      ocrWorker = await Tesseract.createWorker('eng', 1, {
        logger: m => {
          if (m && m.status) {
            const pct = m.progress ? ' ' + Math.round(m.progress * 100) + '%' : '';
            mostrarEstado('OCR: ' + m.status + pct, 'info');
          }
        }
      });

      ocrInicializado = true;
      return ocrWorker;
    }

    async function leerPatenteOCR() {
      limpiarEstado();

      try {
        if (!imagenCapturadaBase64) {
          mostrarEstado('Primero debes capturar una foto.', 'error');
          return;
        }

        setOcrTexto('Procesando imagen...');
        const worker = await asegurarWorkerOCR();

        const {
          data: { text }
        } = await worker.recognize(imagenCapturadaBase64);

        const textoBruto = text || '';
        const textoLimpio = normalizarTextoOCR(textoBruto);
        const patenteProbable = extraerPatenteProbable(textoBruto);

        setOcrTexto(
          'TEXTO BRUTO:\n' + textoBruto + '\n\n' +
          'TEXTO LIMPIO:\n' + textoLimpio + '\n\n' +
          'PATENTE PROBABLE:\n' + (patenteProbable || 'No encontrada')
        );

        if (patenteProbable) {
          document.getElementById('patente').value = patenteProbable;
          mostrarEstado('OCR completado. Patente probable detectada: ' + patenteProbable, 'ok');
        } else {
          mostrarEstado('OCR completado, pero no se detectó una patente clara. Revisa el texto OCR.', 'error');
        }

      } catch (error) {
        setOcrTexto('Error OCR: ' + error.message);
        mostrarEstado('Error al ejecutar OCR: ' + error.message, 'error');
      }
    }

    function subirEvidencia(patente) {
      return new Promise((resolve, reject) => {
        try {
          validarBackend();

          if (!imagenCapturadaBase64) {
            resolve('');
            return;
          }

          const imageBase64 = dataUrlToBase64(imagenCapturadaBase64);

          if (!imageBase64) {
            resolve('');
            return;
          }

          const form = document.createElement('form');
          form.method = 'POST';
          form.action = APPS_SCRIPT_URL;
          form.target = 'uploadFrame';
          form.style.display = 'none';

          const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
          const fileName = 'EVIDENCIA_' + limpiarNombreArchivo(patente) + '_' + timestamp + '.jpg';

          const fields = {
            action: 'uploadEvidencia',
            patente: patente,
            mimeType: 'image/jpeg',
            fileName: fileName,
            imageBase64: imageBase64
          };

          Object.entries(fields).forEach(([key, value]) => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value || '';
            form.appendChild(input);
          });

          let timeoutId = null;

          function cleanup() {
            if (timeoutId) clearTimeout(timeoutId);
            window.removeEventListener('message', onMessage);
            if (form.parentNode) form.parentNode.removeChild(form);
          }

          function onMessage(event) {
            let payload = event.data;

            if (typeof payload === 'string') {
              try {
                payload = JSON.parse(payload);
              } catch (e) {
                return;
              }
            }

            if (!payload || payload.source !== 'KRUGGER_UPLOAD') {
              return;
            }

            cleanup();

            if (payload.ok) {
              resolve(payload.url || '');
            } else {
              reject(new Error(payload.error || 'Error al subir evidencia.'));
            }
          }

          timeoutId = setTimeout(() => {
            cleanup();
            reject(new Error('La subida de evidencia tardó demasiado.'));
          }, 30000);

          window.addEventListener('message', onMessage);
          document.body.appendChild(form);
          form.submit();

        } catch (error) {
          reject(error);
        }
      });
    }

    async function buscarPatente() {
      limpiarEstado();

      try {
        const patente = document.getElementById('patente').value.trim();

        if (!patente) {
          mostrarEstado('Debes ingresar una patente.', 'error');
          return;
        }

        mostrarEstado('Buscando patente...', 'info');

        const data = await jsonpRequest('buscar', {
          patente: patente
        });

        if (!data.ok) {
          throw new Error(data.error || 'Error desconocido al buscar.');
        }

        const box = document.getElementById('resultado');
        box.style.display = 'block';

        if (data.encontrado) {
          box.className = 'resultado encontrado';
          box.innerHTML = `
            <h3>Vehículo encontrado</h3>
            <div class="campo-resultado"><strong>Patente original:</strong> ${data.patenteOriginal || ''}</div>
            <div class="campo-resultado"><strong>Patente normalizada:</strong> ${data.patenteNormalizada || ''}</div>
            <div class="campo-resultado"><strong>Nombre:</strong> ${data.nombre || ''}</div>
            <div class="campo-resultado"><strong>Jefatura:</strong> ${data.jefatura || ''}</div>
            <div class="campo-resultado"><strong>Tipo vehículo:</strong> ${data.tipoVehiculo || ''}</div>
            <div class="campo-resultado"><strong>Planta:</strong> ${data.planta || ''}</div>
          `;
          mostrarEstado('Patente encontrada correctamente.', 'ok');
        } else {
          box.className = 'resultado no-encontrado';
          box.innerHTML = `
            <h3>Patente sin registro</h3>
            <div class="campo-resultado"><strong>Patente ingresada:</strong> ${patente}</div>
            <div class="campo-resultado"><strong>Patente normalizada:</strong> ${data.patenteNormalizada || ''}</div>
            <div class="campo-resultado"><strong>Estado:</strong> SIN REGISTRO</div>
          `;
          mostrarEstado('La patente no tiene registro en la base.', 'error');
        }

      } catch (error) {
        mostrarEstado('Error al buscar: ' + error.message, 'error');
      }
    }

    async function registrarMovimiento() {
      limpiarEstado();

      try {
        const patente = document.getElementById('patente').value.trim();
        const guardia = document.getElementById('guardia').value.trim();
        const acceso = document.getElementById('acceso').value.trim();
        const acompanante = document.getElementById('acompanante').value.trim();
        const observacion = document.getElementById('observacion').value.trim();

        if (!patente) {
          mostrarEstado('Debes ingresar una patente.', 'error');
          return;
        }

        if (!guardia) {
          mostrarEstado('Debes ingresar el nombre del guardia.', 'error');
          return;
        }

        if (!acceso) {
          mostrarEstado('Debes ingresar el acceso.', 'error');
          return;
        }

        let evidenciaUrl = '';

        if (imagenCapturadaBase64) {
          mostrarEstado('Subiendo foto evidencia a Drive...', 'info');
          evidenciaUrl = await subirEvidencia(patente);
        }

        mostrarEstado('Registrando movimiento en Google Sheets...', 'info');

        const data = await jsonpRequest('registrar', {
          patente: patente,
          tipoMovimiento: tipoMovimiento,
          guardia: guardia,
          acceso: acceso,
          acompanante: acompanante,
          observacion: observacion,
          evidenciaUrl: evidenciaUrl
        });

        if (!data.ok) {
          throw new Error(data.error || 'Error desconocido al registrar.');
        }

        const box = document.getElementById('resultado');
        box.style.display = 'block';
        box.className = data.resultado === 'ENCONTRADO'
          ? 'resultado encontrado'
          : 'resultado no-encontrado';

        box.innerHTML = `
          <h3>Movimiento registrado</h3>
          <div class="campo-resultado"><strong>Tipo movimiento:</strong> ${data.tipoMovimiento}</div>
          <div class="campo-resultado"><strong>Patente leída:</strong> ${data.patenteLeida}</div>
          <div class="campo-resultado"><strong>Patente normalizada:</strong> ${data.patenteNormalizada}</div>
          <div class="campo-resultado"><strong>Resultado:</strong> ${data.resultado}</div>
          <div class="campo-resultado"><strong>Nombre:</strong> ${data.nombre || 'Sin registro'}</div>
          <div class="campo-resultado"><strong>Jefatura:</strong> ${data.jefatura || ''}</div>
          <div class="campo-resultado"><strong>Tipo vehículo:</strong> ${data.tipoVehiculo || ''}</div>
          <div class="campo-resultado"><strong>Evidencia:</strong> ${
            evidenciaUrl
              ? `<a class="link-evidencia" href="${evidenciaUrl}" target="_blank">Abrir evidencia</a>`
              : 'Sin foto'
          }</div>
        `;

        mostrarEstado('Movimiento registrado correctamente con evidencia.', 'ok');

      } catch (error) {
        mostrarEstado('Error al registrar: ' + error.message, 'error');
      }
    }
  </script>
